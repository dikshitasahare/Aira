{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRA — Sign In</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&display=swap" rel="stylesheet">
<style>

:root{
--primary:#6C63FF;
--accent:#00D4FF;
--text:#E8EAF0;
--muted:#6B7280;
--border:rgba(255,255,255,0.15);
--glass:rgba(255,255,255,0.06);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'DM Sans',sans-serif;
height:100vh;
color:var(--text);
overflow:hidden;

background:
linear-gradient(to right,
rgba(7,11,20,0.95),
rgba(7,11,20,0.7),
rgba(7,11,20,0.4)),
url("{% static 'images/bg.jpg' %}");

background-size:cover;
background-position:right center;
display:flex;
align-items:center;
}

/* animated background movement */

@keyframes bgmove{
0%{background-position:100% center}
100%{background-position:80% center}
}

body{animation:bgmove 40s ease infinite alternate}

/* neural grid */

.grid{
position:fixed;
inset:0;
pointer-events:none;
background-image:
linear-gradient(rgba(108,99,255,0.08) 1px,transparent 1px),
linear-gradient(90deg,rgba(108,99,255,0.08) 1px,transparent 1px);
background-size:60px 60px;
animation:gridMove 18s linear infinite;
}

@keyframes gridMove{
from{background-position:0 0}
to{background-position:60px 60px}
}

/* holographic orbs */

.orb{
position:fixed;
border-radius:50%;
filter:blur(100px);
opacity:.25;
animation:float 8s ease-in-out infinite;
pointer-events:none;
}

.orb1{width:450px;height:450px;background:#6C63FF;top:-150px;left:-150px}
.orb2{width:400px;height:400px;background:#00D4FF;bottom:-150px;right:-100px;animation-delay:-3s}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-40px)}
}

/* GPU particle canvas */

#particleCanvas{
position:fixed;
inset:0;
z-index:0;
}

/* cursor glow */

.cursor-glow{
position:fixed;
width:220px;
height:220px;
border-radius:50%;
pointer-events:none;
background:radial-gradient(circle,
rgba(0,212,255,.35),
transparent 70%);
mix-blend-mode:screen;
transform:translate(-50%,-50%);
z-index:1;
}

/* layout */

.wrap{
position:relative;
z-index:2;
width:100%;
max-width:460px;
margin-left:140px;
margin-top:40px;
}

/* logo */

.logo{text-align:center;margin-bottom:2rem}

.logo-img{
width:80px;height:80px;border-radius:20px;
box-shadow:0 0 40px rgba(108,99,255,0.6);
}

.logo h1{
font-family:'Syne',sans-serif;
font-size:2.4rem;
font-weight:800;
background:linear-gradient(135deg,#fff,var(--accent));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logo p{
font-size:.9rem;
color:var(--muted);
}

/* typing text */

.typing{
font-size:.85rem;
margin-top:.3rem;
color:var(--accent);
height:20px;
}

/* glass card */

.card{
backdrop-filter:blur(18px);
background:var(--glass);
border:1px solid var(--border);
border-radius:20px;
padding:2rem;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

/* inputs */

.field{margin-bottom:1rem}

label{
font-size:.75rem;
text-transform:uppercase;
letter-spacing:.08em;
color:var(--muted)
}

input{
width:100%;
padding:.7rem 1rem;
border-radius:10px;
border:1px solid rgba(255,255,255,.1);
background:rgba(255,255,255,.05);
color:white;
outline:none;
transition:.2s
}

input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(108,99,255,.3)
}

/* button */

.btn{
width:100%;
margin-top:.6rem;
padding:.8rem;
border:none;
border-radius:10px;
font-family:'Syne',sans-serif;
font-weight:700;
color:white;
background:linear-gradient(135deg,var(--primary),#8B5CF6);
cursor:pointer;
box-shadow:0 5px 25px rgba(108,99,255,.5);
transition:.2s
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 10px 35px rgba(108,99,255,.7)
}

.alert{
padding:.7rem 1rem;
border-radius:9px;
margin-bottom:1rem;
font-size:.85rem;
background:rgba(255,77,109,.12);
border:1px solid rgba(255,77,109,.4);
color:#FF4D6D;
}

.foot{
text-align:center;
margin-top:1rem;
font-size:.85rem;
color:var(--muted)
}

.foot a{color:var(--primary);text-decoration:none}

</style>
</head>

<body>

<div class="grid"></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<canvas id="particleCanvas"></canvas>

<div class="cursor-glow" id="cursorGlow"></div>

<div class="wrap">

<div class="logo">
<img class="logo-img" src="{% static 'images/icon.jpeg' %}">
<h1>AIRA</h1>
<p>Advanced Intelligent Reasoning Assistant</p>
<div class="typing" id="typing"></div>
</div>

<div class="card">

{% for msg in messages %}
<div class="alert">⚠ {{ msg }}</div>
{% endfor %}

<form method="POST">

{% csrf_token %}

<div class="field">
<label>Username</label>
<input type="text" name="username" placeholder="your_username" required>
</div>

<div class="field">
<label>Password</label>
<input type="password" name="password" placeholder="••••••••" required>
</div>

<button class="btn">Sign In →</button>

</form>

<div class="foot">
No account? <a href="{% url 'accounts:register' %}">Create one</a>
</div>

</div>

</div>

<script>

/* typing animation */

const words=[
"Connecting to neural interface...",
"Initializing AI modules...",
"Loading cognitive engine..."
]

let i=0,j=0,current="",isDeleting=false
const typing=document.getElementById("typing")

function type(){

if(i<words.length){

if(!isDeleting && j<=words[i].length){
current=words[i].substring(0,j++)
typing.textContent=current
}

if(isDeleting && j>=0){
current=words[i].substring(0,j--)
typing.textContent=current
}

if(j==words[i].length)isDeleting=true

if(isDeleting && j==0){
isDeleting=false
i=(i+1)%words.length
}

}

setTimeout(type,isDeleting?40:80)
}

type()

/* cursor glow */

const glow=document.getElementById("cursorGlow")

document.addEventListener("mousemove",e=>{
glow.style.left=e.clientX+"px"
glow.style.top=e.clientY+"px"
})

/* GPU particle canvas */

const canvas=document.getElementById("particleCanvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-.5)*0.5,
vy:(Math.random()-.5)*0.5,
size:Math.random()*2
})
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="rgba(0,212,255,0.6)"

particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy

if(p.x<0||p.x>canvas.width)p.vx*=-1
if(p.y<0||p.y>canvas.height)p.vy*=-1

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()
})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
